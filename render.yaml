services:
  - type: web
    name: payment-email-sender
    env: node
    region: oregon
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/payment-email run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: RESEND_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: payment-email-db
          property: connectionString

databases:
  - name: payment-email-db
    databaseName: payment_email
    plan: free
