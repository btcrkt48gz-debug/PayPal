kind = "web"
previewPath = "/"
title = "Payment Email Sender"
version = "1.0.0"
id = "artifacts/payment-email"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22948

[services.development]
run = "pnpm --filter @workspace/payment-email run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/payment-email", "run", "build" ]
publicDir = "artifacts/payment-email/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22948"
BASE_PATH = "/"
